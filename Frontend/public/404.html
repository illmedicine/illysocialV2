<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IllySocial</title>
    <!-- Single Page Apps for GitHub Pages: encode the requested deep-link path
         into a query string and redirect to the app root, which decodes it. -->
    <script type="text/javascript">
      (function (l) {
        var pathSegmentsToKeep = 1; // keep "/isocial/"
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
