<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/isocial/assets/illysocial.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IllySocial — Creators</title>
    <!-- Single Page Apps for GitHub Pages: restore the deep-link path that
         404.html encoded into the query string before the app boots. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
